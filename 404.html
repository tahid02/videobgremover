<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <script>
      // Redirect 404s back to index.html for SPA routing on GitHub Pages
      const path = window.location.pathname
      window.location.replace(
        window.location.origin + '/videobgremover/' +
        (path.startsWith('/videobgremover') ? path.slice('/videobgremover'.length) : path)
      )
    </script>
  </head>
  <body></body>
</html>
